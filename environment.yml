name: chem-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - rdkit=2023.09
  - numpy=1.26.4
  - pip
  - pip:
    - numpy==1.26.4
    - streamlit>=1.40.0
    - py3Dmol>=2.0.0  # 3D molecular visualization
    - scikit-learn>=1.3.0
    - joblib>=1.3.0
    - openai>=1.0.0
    - requests>=2.31.0
    - python-dotenv>=1.0.0
    - shap
    - torch>=2.1.0  # for GNN model
